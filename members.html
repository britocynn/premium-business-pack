<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Members</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:#f5ead9;
  padding:18px 14px 30px;
}

.container{
  max-width:1000px;
  margin:auto;
}

/* TOP BAR */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.top button{
  background:#2b241c;
  color:#f5ead9;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
}

select{
  padding:10px;
  border-radius:10px;
  border:none;
}

/* INFO BAR (SUBSTITUI HERO) */

.info{
  background:#f8f0e3;
  color:#2b241c;
  padding:14px 16px;
  border-radius:14px;
  margin-bottom:18px;
}

.info p{
  margin:4px 0;
  font-size:14px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.card{
  background:#fffaf2;
  color:#2b241c;
  padding:18px;
  border-radius:16px;
}

.card h3{
  margin:0 0 6px 0;
}

.card p{
  font-size:14px;
  color:#6b5a43;
}

.card button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#d6a84f,#9c6a26);
  color:white;
  font-weight:bold;
}

.locked{
  opacity:0.5;
}

.locked button{
  background:#999;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
  <button onclick="logout()">Logout</button>
  <select id="lang" onchange="setLang()">
    <option value="en">EN</option>
    <option value="pt">PT</option>
  </select>
</div>

<div class="info">
  <p id="email">Email: -</p>
  <p id="plan">Plan: -</p>
  <p id="status">Status: -</p>
</div>

<div class="grid">

  <div class="card">
    <h3>Names Generator</h3>
    <p>Create premium business names</p>
    <button onclick="go('/premium-names.html')">Open</button>
  </div>

  <div class="card">
    <h3>Ideas Generator</h3>
    <p>Generate business ideas</p>
    <button onclick="go('/ideas.html')">Open</button>
  </div>

  <div class="card">
    <h3>Ebook</h3>
    <p>Access your guide</p>
    <button onclick="go('/ebook.html')">Open</button>
  </div>

  <div class="card">
    <h3>Checklist</h3>
    <p>Follow the execution steps</p>
    <button onclick="go('/checklist.html')">Open</button>
  </div>

  <div class="card" id="libraryCard">
    <h3>Library</h3>
    <p>Premium templates and resources</p>
    <button onclick="go('/library.html')">Open</button>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/auth.js"></script>

<script>
function go(url){
  window.location.href = url;
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href="/login.html";
}

async function load(){
  const user = await getCurrentUser();
  if(!user){
    window.location.href="/login.html";
    return;
  }

  const profile = await getProfile();

  document.getElementById("email").innerText = "Email: " + user.email;

  if(profile){
    document.getElementById("plan").innerText = "Plan: " + (profile.plan || "free");
    document.getElementById("status").innerText = profile.is_premium ? "Premium active" : "No premium";

    if(profile.plan !== "complete_plus_library"){
      document.getElementById("libraryCard").classList.add("locked");
    }
  }
}

load();
</script>

</body>
</html>
