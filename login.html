<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3c2b16 0%, #1b1712 30%, #0f0f0f 100%);
      color:#f5ead9;
      text-align:center;
      padding:40px 20px;
    }

    .container{
      max-width:520px;
      margin:auto;
      background:#f8f0e3;
      color:#2b241c;
      padding:30px 24px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .language-wrap{
      margin-bottom:20px;
      text-align:right;
    }

    .language-wrap select{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #d9c39b;
      font-size:15px;
    }

    h1{
      margin-top:0;
      margin-bottom:10px;
    }

    .subtitle{
      color:#6e5a3b;
      margin-bottom:25px;
    }

    label{
      display:block;
      text-align:left;
      margin:14px 0 8px;
      font-weight:bold;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border-radius:10px;
      border:1px solid #d9c39b;
      font-size:16px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      margin-top:20px;
    }

    .btn-primary{
      background:linear-gradient(135deg,#d6a84f,#9c6a26);
      color:white;
    }

    .secondary-link{
      margin-top:18px;
      font-size:14px;
    }

    .secondary-link a{
      color:#9c6a26;
      text-decoration:none;
      font-weight:bold;
    }

    .message{
      margin-top:18px;
      font-size:14px;
      color:#7a5d2f;
      min-height:20px;
    }

    .password-wrap{
  position:relative;
  width:100%;
}

.password-wrap input{
  width:100%;
  box-sizing:border-box;
  padding-right:45px;
}

.toggle-password{
  position:absolute;
  top:50%;
  right:12px;
  transform:translateY(-50%);
  background:none;
  border:none;
  cursor:pointer;
  font-size:18px;
}
  .site-footer{
  width:100%;
  margin-top:26px;
}

.site-footer-content{
  max-width:1100px;
  margin:0 auto;
  text-align:center;
  color:#cbb58c;
  font-size:14px;
  padding:0 18px 24px;
  box-sizing:border-box;
}

.site-footer-content p{
  margin:8px 0;
}

#footerNote{
  font-weight:bold;
}
  </style>
</head>
<body>

  <div class="container">

    <div class="language-wrap">
      <select id="language" onchange="updateLanguage()">
        <option value="en">English</option>
        <option value="pt">Português</option>
      </select>
    </div>

    <h1 id="title">Login</h1>
    <p class="subtitle" id="subtitle">Access your Premium Business Pack account</p>

    <label id="emailLabel" for="email">Email</label>
    <input id="email" type="email" placeholder="Enter your email" />

    <label id="passwordLabel" for="password">Password</label>
    <div class="password-wrap">
  <input id="password" type="password" placeholder="Enter your password" />
  <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁</button>
</div>
    <button class="btn-primary" id="loginBtn" type="button" onclick="handleLogin()">Login</button>

    <div class="secondary-link">
      <span id="signupText">Don't have an account?</span>
      <a href="/signup.html" id="signupLink">Create one</a>
    </div>

    <div class="message" id="message"></div>

  </div>

          <footer class="site-footer">
  <div class="site-footer-content">
    <p id="footerNote">Everything in one place, organized for fast execution.</p>
    <p id="footerCopy">© 2025 SB - Contabilidade & Consultoria. All rigths reserved.</p>
    <p id="footerTagline">System created to acelerate Business creation</p>
    <p id="footerAuthor">Developed by Suellen Brito</p>
  </div>
</footer>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    function updateLanguage(){
  const lang = document.getElementById("language").value;

  if(lang === "pt"){
    document.documentElement.lang = "pt";
    document.title = "Entrar";
    document.getElementById("title").innerText = "Entrar";
    document.getElementById("subtitle").innerText = "Acede à tua conta do Pack Premium de Negócio";
    document.getElementById("emailLabel").innerText = "Email";
    document.getElementById("passwordLabel").innerText = "Palavra-passe";
    document.getElementById("email").placeholder = "Introduz o teu email";
    document.getElementById("password").placeholder = "Introduz a tua palavra-passe";
    document.getElementById("loginBtn").innerText = "Entrar";
    document.getElementById("signupText").innerText = "Ainda não tens conta?";
    document.getElementById("signupLink").innerText = "Criar conta";

    const footerNote = document.getElementById("footerNote");
    const footerCopy = document.getElementById("footerCopy");
    const footerTagline = document.getElementById("footerTagline");
    const footerAuthor = document.getElementById("footerAuthor");

    if (footerNote) {
      footerNote.innerText = "Tudo num só lugar, organizado para execução rápida.";
    }
    if (footerCopy) {
      footerCopy.innerText = "© 2025 SB - Contabilidade & Consultoria. Todos os direitos reservados.";
    }
    if (footerTagline) {
      footerTagline.innerText = "Sistema criado para acelerar a criação de negócios";
    }
    if (footerAuthor) {
      footerAuthor.innerText = "Desenvolvido por Suellen Brito";
    }

  } else {
    document.documentElement.lang = "en";
    document.title = "Login";
    document.getElementById("title").innerText = "Login";
    document.getElementById("subtitle").innerText = "Access your Premium Business Pack account";
    document.getElementById("emailLabel").innerText = "Email";
    document.getElementById("passwordLabel").innerText = "Password";
    document.getElementById("email").placeholder = "Enter your email";
    document.getElementById("password").placeholder = "Enter your password";
    document.getElementById("loginBtn").innerText = "Login";
    document.getElementById("signupText").innerText = "Don't have an account?";
    document.getElementById("signupLink").innerText = "Create one";

    const footerNote = document.getElementById("footerNote");
    const footerCopy = document.getElementById("footerCopy");
    const footerTagline = document.getElementById("footerTagline");
    const footerAuthor = document.getElementById("footerAuthor");

    if (footerNote) {
      footerNote.innerText = "Everything in one place, organized for fast execution.";
    }
    if (footerCopy) {
      footerCopy.innerText = "© 2025 SB - Contabilidade & Consultoria. All rights reserved.";
    }
    if (footerTagline) {
      footerTagline.innerText = "System created to accelerate business creation";
    }
    if (footerAuthor) {
      footerAuthor.innerText = "Developed by Suellen Brito";
    }
  }

  document.getElementById("message").innerText = "";
}
    async function handleLogin(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const lang = document.getElementById("language").value;
      const message = document.getElementById("message");

      message.innerText = "";

      if(!email || !password){
        message.innerText = lang === "pt"
          ? "Preenche todos os campos."
          : "Please fill in all fields.";
        return;
      }

      const result = await signInUser(email, password);

      if(!result){
        message.innerText = lang === "pt"
          ? "Não foi possível iniciar sessão."
          : "Could not log in.";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const selectedPlan = params.get("plan");

      if(selectedPlan){
        window.location.href = `/members.html?checkout=1&plan=${selectedPlan}`;
      } else {
        window.location.href = "/members.html";
      }
    }

    function togglePassword(inputId, button){
  const input = document.getElementById(inputId);

  if(input.type === "password"){
    input.type = "text";
    button.innerText = "🙈";
  } else {
    input.type = "password";
    button.innerText = "👁";
  }
}

    updateLanguage();
  </script>
</body>
</html>
