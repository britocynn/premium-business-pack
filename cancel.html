<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #3c2b16 0%, #1b1712 30%, #0f0f0f 100%);
  color:#f5ead9;
  text-align:center;
  padding:40px 20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#f8f0e3;
  color:#2b241c;
  padding:32px 24px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.language-wrap{
  margin-bottom:20px;
  text-align:right;
}

.language-wrap select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d9c39b;
  font-size:15px;
}

h1{
  margin-top:0;
}

p{
  color:#6e5a3b;
  line-height:1.5;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  margin-top:20px;
  background:linear-gradient(135deg,#d6a84f,#9c6a26);
  color:white;
}
</style>
</head>
<body>

<div class="container">
  <div class="language-wrap">
    <select id="language" onchange="updateLanguage()">
      <option value="en">English</option>
      <option value="pt">Português</option>
    </select>
  </div>

  <h1 id="title">Payment Cancelled</h1>
  <p id="subtitle">No problem. You can return and complete your purchase whenever you want.</p>

  <button id="backBtn" onclick="goHome()">Back to Offer</button>
</div>

<script>
function goHome(){
  window.location.href = "/index.html";
}

function updateLanguage(){
  const lang = document.getElementById("language").value;

  if(lang === "pt"){
    document.documentElement.lang = "pt";
    document.title = "Pagamento Cancelado";
    document.getElementById("title").innerText = "Pagamento Cancelado";
    document.getElementById("subtitle").innerText = "Sem problema. Podes voltar e concluir a compra quando quiseres.";
    document.getElementById("backBtn").innerText = "Voltar à Oferta";
  } else {
    document.documentElement.lang = "en";
    document.title = "Payment Cancelled";
    document.getElementById("title").innerText = "Payment Cancelled";
    document.getElementById("subtitle").innerText = "No problem. You can return and complete your purchase whenever you want.";
    document.getElementById("backBtn").innerText = "Back to Offer";
  }
}
</script>

</body>
</html>
