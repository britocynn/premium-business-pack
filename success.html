<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #3c2b16 0%, #1b1712 30%, #0f0f0f 100%);
  color:#f5ead9;
  text-align:center;
  padding:40px 20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#f8f0e3;
  color:#2b241c;
  padding:32px 24px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.language-wrap{
  margin-bottom:20px;
  text-align:right;
}

.language-wrap select{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d9c39b;
  font-size:15px;
}

h1{
  margin-top:0;
}

p{
  color:#6e5a3b;
  line-height:1.5;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  margin-top:20px;
  background:linear-gradient(135deg,#d6a84f,#9c6a26);
  color:white;
}
</style>
</head>
<body>

<div class="container">
  <div class="language-wrap">
    <select id="language" onchange="updateLanguage()">
      <option value="en">English</option>
      <option value="pt">Português</option>
    </select>
  </div>

  <h1 id="title">Payment Successful 🎉</h1>
  <p id="subtitle">Your access is being activated. You can now enter your members area.</p>

  <button id="membersBtn" onclick="goMembers()">Go to Members Area</button>
</div>

<script>
function goMembers(){
  window.location.href = "/members.html";
}

function updateLanguage(){
  const lang = document.getElementById("language").value;

  if(lang === "pt"){
    document.documentElement.lang = "pt";
    document.title = "Pagamento Concluído";
    document.getElementById("title").innerText = "Pagamento Concluído 🎉";
    document.getElementById("subtitle").innerText = "O teu acesso está a ser ativado. Já podes entrar na tua área de membro.";
    document.getElementById("membersBtn").innerText = "Ir para a Área de Membro";
  } else {
    document.documentElement.lang = "en";
    document.title = "Payment Successful";
    document.getElementById("title").innerText = "Payment Successful 🎉";
    document.getElementById("subtitle").innerText = "Your access is being activated. You can now enter your members area.";
    document.getElementById("membersBtn").innerText = "Go to Members Area";
  }
}
</script>

</body>
</html>
